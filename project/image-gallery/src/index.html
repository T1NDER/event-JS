<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Галерея изображений</title>
</head>
<body>
  <div class="container">
    <h1>Галерея изображений</h1>
    
    <div class="add-form">
      <div class="form-group">
        <label for="imageName">Название изображения</label>
        <input type="text" id="imageName" placeholder="Введите название..." class="form-input">
      </div>
      
      <div class="form-group">
        <label for="imageUrl">Ссылка на изображение</label>
        <input type="url" id="imageUrl" placeholder="https://example.com/image.jpg" class="form-input">
        <span class="error-message" id="urlError">Неверный URL изображения</span>
      </div>
      
      <button id="addBtn" class="add-btn">Добавить</button>
    </div>
    
    <div class="gallery" id="gallery"></div>
  </div>
</body>
</html>
