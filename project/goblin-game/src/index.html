<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Игра с гоблинами</title>
</head>
<body>
  <div class="game-container">
    <div class="header">
      <h1>Поймай гоблина!</h1>
      <div class="stats">
        <span class="score">Счёт: <span id="score">0</span></span>
        <span class="misses">Промахи: <span id="misses">0</span>/5</span>
      </div>
    </div>
    <div class="game-board" id="gameBoard"></div>
    <button class="start-btn" id="startBtn">Начать игру</button>
  </div>
</body>
</html>
