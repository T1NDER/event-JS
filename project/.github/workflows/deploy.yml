name: Deploy to GitHub Pages

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Yarn
        run: npm install -g yarn

      - name: Install dependencies (goblin-game)
        working-directory: ./goblin-game
        run: yarn install

      - name: Build (goblin-game)
        working-directory: ./goblin-game
        run: yarn build

      - name: Install dependencies (task-tracker)
        working-directory: ./task-tracker
        run: yarn install

      - name: Build (task-tracker)
        working-directory: ./task-tracker
        run: yarn build

      - name: Install dependencies (image-gallery)
        working-directory: ./image-gallery
        run: yarn install

      - name: Build (image-gallery)
        working-directory: ./image-gallery
        run: yarn build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './goblin-game/dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
